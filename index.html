<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CrazyOx.ai — AI驱动的投资视角与自动化叙事</title>
  <meta name="description" content="AI板块价值迁徙、半导体杠杆监控、CyberFlow AI自动化IP运营——深度投研视角与AI工具集成" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-deep:    #FFFFFF;
      --bg-surface: #F8FAF9;
      --bg-card:    #FFFFFF;
      --bg-elevated:#EEF3F1;
      --border:     #D8E0DD;
      --border-subtle: #E8EEEC;

      --text-primary:   #1A1A2E;
      --text-secondary: #5A6B6B;
      --text-muted:     #94A3A3;

      --accent:      #0ABAB5;
      --accent-hover: #2DD4C8;
      --accent-dim:   #0D9488;
      --accent-subtle: rgba(10, 186, 181, 0.06);
      --accent-glow:  rgba(10, 186, 181, 0.15);

      --success: #0ABAB5;
      --warning: #F59E0B;
      --danger:  #EF4444;
      --info:    #0ABAB5;

      --font-pixel:   'Press Start 2P', monospace;
      --font-display: 'VT323', monospace;
      --font-body:    'Noto Sans SC', 'PingFang SC', system-ui, sans-serif;
      --font-serif:   'Noto Serif SC', 'Songti SC', serif;

      --space-xs:  0.25rem;
      --space-sm:  0.5rem;
      --space-md:  1rem;
      --space-lg:  2rem;
      --space-xl:  4rem;

      --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
    }

    *, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }

    html {
      scroll-behavior: smooth;
      scrollbar-width: thin;
      scrollbar-color: var(--accent-dim) var(--bg-deep);
    }

    body {
      font-family: var(--font-body);
      background: var(--bg-deep);
      color: var(--text-primary);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      cursor: crosshair;
    }

    a { color: inherit; text-decoration: none; }
    img { max-width: 100%; display: block; }
    button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }

    .container { width: min(1200px, 90vw); margin-inline: auto; }
    .section { padding: var(--space-xl) 0; }

    .accent { color: var(--accent-hover); }

    /* ===== PIXEL SCROLLBAR ===== */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg-deep); }
    ::-webkit-scrollbar-thumb { background: var(--accent-dim); border: 2px solid var(--bg-deep); }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

    /* ===== SCANLINES (CRT EFFECT) ===== */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.04) 2px,
        rgba(0,0,0,0.04) 4px
      );
      opacity: 0.4;
    }

    /* ===== PIXEL GRID BACKGROUND ===== */
    .pixel-grid {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background-image:
        linear-gradient(rgba(10,186,181,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(10,186,181,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridScroll 20s linear infinite;
    }

    @keyframes gridScroll {
      0% { background-position: 0 0; }
      100% { background-position: 40px 40px; }
    }

    /* ===== TOPO LINE ===== */
    .topo-line {
      width: 100%;
      height: 2px;
      background: repeating-linear-gradient(
        90deg,
        var(--accent) 0px,
        var(--accent) 4px,
        transparent 4px,
        transparent 8px
      );
      background-size: 200% 100%;
      opacity: 0.5;
      margin: var(--space-lg) 0;
      animation: pixelDash 1s linear infinite;
    }

    @keyframes pixelDash {
      0% { background-position: 0 0; }
      100% { background-position: 8px 0; }
    }

    /* ===== HERO ===== */
    .hero {
      min-height: 100vh;
      display: grid;
      grid-template-rows: 1fr auto;
      position: relative;
      overflow: hidden;
    }

    .hero-glitch {
      position: absolute;
      top: -40%;
      right: -20%;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, var(--accent-glow) 0%, transparent 50%);
      filter: blur(60px);
      pointer-events: none;
      animation: glitchPulse 4s ease-in-out infinite;
    }

    @keyframes glitchPulse {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      25% { opacity: 0.5; transform: scale(1.05) translate(10px, -5px); }
      50% { opacity: 0.2; transform: scale(0.95) translate(-5px, 10px); }
      75% { opacity: 0.4; transform: scale(1.02) translate(5px, 5px); }
    }

    .hero-inner {
      container-type: inline-size;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: var(--space-xl) var(--space-md);
      position: relative;
      z-index: 1;
    }

    .hero-tag {
      font-family: var(--font-pixel);
      font-size: 0.55rem;
      line-height: 1.8;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      border: 2px solid var(--accent);
      padding: 0.6em 1.2em;
      width: fit-content;
      margin-bottom: var(--space-lg);
      animation: borderFlicker 3s ease-in-out infinite;
      text-shadow: 0 0 10px var(--accent-glow);
    }

    @keyframes borderFlicker {
      0%, 100% { border-color: var(--accent); box-shadow: 0 0 5px var(--accent-glow); }
      50% { border-color: var(--accent-dim); box-shadow: 0 0 2px rgba(10,186,181,0.1); }
      75% { border-color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); }
    }

    .hero-title {
      font-family: var(--font-display);
      font-size: clamp(4rem, 10vw, 9rem);
      font-weight: 400;
      line-height: 0.9;
      letter-spacing: -0.02em;
      margin-bottom: var(--space-md);
      text-transform: uppercase;
      text-shadow: 
        0 0 10px var(--accent-glow),
        0 0 40px rgba(10,186,181,0.08),
        4px 4px 0px var(--accent-dim);
      animation: textGlitch 5s ease-in-out infinite;
    }

    @keyframes textGlitch {
      0%, 100% { text-shadow: 0 0 10px var(--accent-glow), 0 0 40px rgba(10,186,181,0.08), 4px 4px 0px var(--accent-dim); }
      25% { text-shadow: 0 0 15px var(--accent-glow), 0 0 60px rgba(10,186,181,0.1), -2px 4px 0px var(--accent-dim); }
      50% { text-shadow: 0 0 5px var(--accent-glow), 0 0 30px rgba(10,186,181,0.1), 4px -2px 0px var(--accent-dim); }
      75% { text-shadow: 0 0 20px var(--accent-glow), 0 0 80px rgba(10,186,181,0.12), -4px -4px 0px var(--accent-dim); }
    }

    .hero-title em {
      font-style: normal;
      color: var(--accent);
      text-shadow: 0 0 10px var(--accent-glow);
      animation: colorPulse 2s ease-in-out infinite;
    }

    @keyframes colorPulse {
      0%, 100% { color: var(--accent); text-shadow: 0 0 10px var(--accent-glow); }
      50% { color: var(--accent-dim); text-shadow: 0 0 20px var(--accent-glow); }
    }

    .hero-sub {
      font-family: var(--font-serif);
      font-size: clamp(1rem, 2vw, 1.35rem);
      color: var(--text-secondary);
      max-width: 55ch;
      margin-bottom: var(--space-lg);
      line-height: 1.8;
    }

    .hero-actions {
      display: flex;
      gap: var(--space-md);
      flex-wrap: wrap;
    }

    /* ===== PIXEL BUTTONS ===== */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5em;
      padding: 1em 2em;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      transition: all 0.1s;
      font-family: var(--font-body);
      position: relative;
      border: 2px solid var(--accent);
      background: var(--accent-subtle);
      color: var(--accent);
      clip-path: polygon(
        0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px)
      );
    }

    .btn::before {
      content: '';
      position: absolute;
      inset: 2px;
      background: transparent;
      clip-path: polygon(
        0 0, calc(100% - 6px) 0, 100% 6px, 100% 100%, 6px 100%, 0 calc(100% - 6px)
      );
      pointer-events: none;
    }

    .btn:hover {
      background: var(--accent);
      color: var(--bg-deep);
      transform: translate(-2px, -2px);
      box-shadow: 4px 4px 0px var(--accent-dim);
    }

    .btn:active {
      transform: translate(0, 0);
      box-shadow: none;
    }

    .btn-primary {
      background: var(--accent);
      color: var(--bg-deep);
      font-weight: 700;
      box-shadow: 4px 4px 0px var(--accent-dim);
    }
    .btn-primary:hover {
      box-shadow: 6px 6px 0px var(--accent-dim), 0 0 20px var(--accent-glow);
    }

    .btn-ghost {
      border-color: var(--border);
      color: var(--text-secondary);
      box-shadow: none;
    }
    .btn-ghost:hover {
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: 4px 4px 0px var(--accent-dim);
    }

    /* ===== TICKER ===== */
    .ticker-wrap {
      border-top: 2px solid var(--accent);
      border-bottom: 2px solid var(--accent);
      overflow: hidden;
      padding: 1em 0;
      background: var(--bg-surface);
      position: relative;
    }

    .ticker-wrap::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 80px;
      background: linear-gradient(90deg, var(--bg-surface), transparent);
      z-index: 2;
      pointer-events: none;
    }
    .ticker-wrap::after {
      content: '';
      position: absolute;
      right: 0; top: 0; bottom: 0;
      width: 80px;
      background: linear-gradient(270deg, var(--bg-surface), transparent);
      z-index: 2;
      pointer-events: none;
    }

    .ticker {
      display: flex;
      gap: 3em;
      animation: ticker 30s linear infinite;
      width: max-content;
    }

    .ticker span {
      font-family: var(--font-pixel);
      font-size: 0.6rem;
      line-height: 2;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      white-space: nowrap;
      color: var(--text-muted);
      text-shadow: 0 0 5px rgba(10,186,181,0.1);
    }

    .ticker span::after {
      content: '◆';
      margin-left: 3em;
      color: var(--accent);
      animation: diamondPulse 1s ease-in-out infinite;
    }

    @keyframes diamondPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    @keyframes ticker {
      to { transform: translateX(-50%); }
    }

    /* ===== SECTION HEADER ===== */
    .section-label {
      font-family: var(--font-pixel);
      font-size: 0.55rem;
      line-height: 1.8;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: var(--space-sm);
      text-shadow: 0 0 5px var(--accent-glow);
    }

    .section-title {
      font-family: var(--font-display);
      font-size: clamp(2.5rem, 5vw, 4rem);
      font-weight: 400;
      letter-spacing: 0.02em;
      margin-bottom: var(--space-md);
      text-transform: uppercase;
      text-shadow: 2px 2px 0px var(--accent-dim);
    }

    .section-desc {
      color: var(--text-secondary);
      max-width: 60ch;
      margin-bottom: var(--space-lg);
      line-height: 1.8;
    }

    /* ===== DASH-GRID (tools) ===== */
    .dash-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(100%, 340px), 1fr));
      gap: var(--space-md);
    }

    .dash-card {
      background: var(--bg-card);
      border: 2px solid var(--border-subtle);
      padding: var(--space-lg);
      position: relative;
      overflow: hidden;
      transition: all 0.15s;
      display: flex;
      flex-direction: column;
      clip-path: polygon(
        0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px)
      );
    }

    .dash-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 4px;
      height: 100%;
      background: var(--accent);
      transform: scaleY(0);
      transform-origin: top;
      transition: transform 0.3s var(--ease-out-expo);
    }

    .dash-card:hover {
      border-color: var(--accent);
      transform: translate(-4px, -4px);
      box-shadow: 4px 4px 0px var(--accent-dim), 0 0 30px var(--accent-glow);
    }
    .dash-card:hover::before { transform: scaleY(1); }

    .dash-card-icon {
      font-size: 1.5rem;
      margin-bottom: var(--space-md);
      display: block;
      font-family: var(--font-pixel);
    }

    .dash-card-title {
      font-family: var(--font-display);
      font-size: 1.4rem;
      font-weight: 400;
      margin-bottom: 0.5em;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }

    .dash-card-desc {
      font-size: 0.88rem;
      color: var(--text-secondary);
      line-height: 1.7;
      flex: 1;
    }

    .dash-card-tag {
      display: inline-block;
      margin-top: var(--space-md);
      font-size: 0.6rem;
      font-family: var(--font-pixel);
      line-height: 1.8;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid var(--accent-dim);
      padding: 0.4em 0.8em;
      animation: borderFlicker 4s ease-in-out infinite;
    }

    .dash-card-link {
      display: inline-flex;
      align-items: center;
      gap: 0.4em;
      margin-top: var(--space-md);
      font-size: 0.82rem;
      color: var(--accent);
      font-family: var(--font-display);
      letter-spacing: 0.03em;
      transition: gap 0.3s;
      text-transform: uppercase;
    }
    .dash-card-link:hover { gap: 0.8em; color: var(--accent-hover); }

    /* ===== CONTENT GRID ===== */
    .content-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(100%, 300px), 1fr));
      gap: var(--space-md);
    }

    .content-card {
      background: var(--bg-card);
      border: 2px solid var(--border-subtle);
      padding: var(--space-lg);
      transition: all 0.15s;
      position: relative;
      clip-path: polygon(
        0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px)
      );
    }

    .content-card:hover {
      border-color: var(--accent);
      transform: translate(-3px, -3px);
      box-shadow: 3px 3px 0px var(--accent-dim), 0 0 20px var(--accent-glow);
    }

    .content-card-num {
      font-family: var(--font-display);
      font-size: 3.5rem;
      font-weight: 400;
      line-height: 1;
      color: var(--accent-dim);
      margin-bottom: var(--space-sm);
      text-shadow: 0 0 10px var(--accent-glow);
      animation: numGlow 3s ease-in-out infinite;
    }

    @keyframes numGlow {
      0%, 100% { text-shadow: 0 0 10px var(--accent-glow); color: var(--accent-dim); }
      50% { text-shadow: 0 0 20px var(--accent-glow); color: var(--accent); }
    }

    .content-card-title {
      font-family: var(--font-display);
      font-size: 1.3rem;
      font-weight: 400;
      margin-bottom: 0.5em;
      text-transform: uppercase;
    }

    .content-card-desc {
      font-size: 0.85rem;
      color: var(--text-secondary);
      line-height: 1.7;
    }

    .content-card-count {
      font-size: 0.6rem;
      color: var(--text-muted);
      margin-top: var(--space-md);
      font-family: var(--font-pixel);
      line-height: 1.8;
      letter-spacing: 0.05em;
    }

    /* ===== GITHUB TOOLS ===== */
    .gh-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(100%, 300px), 1fr));
      gap: var(--space-md);
    }

    .gh-card {
      background: var(--bg-card);
      border: 2px solid var(--border-subtle);
      padding: var(--space-lg);
      transition: all 0.15s;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
      clip-path: polygon(
        0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px)
      );
    }

    .gh-card:hover {
      border-color: var(--accent);
      transform: translate(-3px, -3px);
      box-shadow: 3px 3px 0px var(--accent-dim), 0 0 20px var(--accent-glow);
    }

    .gh-card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: var(--space-sm);
    }

    .gh-card-name {
      font-family: var(--font-display);
      font-size: 1.2rem;
      font-weight: 400;
      color: var(--accent);
      text-transform: uppercase;
    }

    .gh-card-star {
      font-size: 0.7rem;
      color: var(--text-muted);
      font-family: var(--font-pixel);
      line-height: 1.8;
      display: flex;
      align-items: center;
      gap: 0.3em;
      flex-shrink: 0;
    }

    .gh-card-desc {
      font-size: 0.85rem;
      color: var(--text-secondary);
      line-height: 1.7;
      flex: 1;
    }

    .gh-card-lang {
      margin-top: var(--space-md);
      display: flex;
      gap: 0.8em;
      flex-wrap: wrap;
    }

    .gh-lang-dot {
      display: inline-flex;
      align-items: center;
      gap: 0.3em;
      font-size: 0.6rem;
      color: var(--text-muted);
      font-family: var(--font-pixel);
      line-height: 1.8;
    }

    .gh-lang-dot::before {
      content: '';
      width: 8px;
      height: 8px;
      background: var(--accent);
      display: inline-block;
      animation: dotBlink 2s ease-in-out infinite;
    }

    @keyframes dotBlink {
      0%, 100% { opacity: 1; box-shadow: 0 0 5px var(--accent); }
      50% { opacity: 0.4; box-shadow: 0 0 2px var(--accent); }
    }

    .gh-card-cta {
      display: inline-flex;
      align-items: center;
      gap: 0.4em;
      margin-top: var(--space-md);
      font-size: 0.82rem;
      color: var(--accent);
      font-family: var(--font-display);
      letter-spacing: 0.03em;
      transition: gap 0.3s;
      text-transform: uppercase;
    }
    .gh-card-cta:hover { gap: 0.8em; color: var(--accent-hover); }

    /* ===== CYBERFLOW ===== */
    .cyberflow {
      background: var(--bg-surface);
      border-top: 2px solid var(--border);
      border-bottom: 2px solid var(--border);
      position: relative;
    }

    .cyberflow::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--accent);
      animation: scanline 4s ease-in-out infinite;
      opacity: 0.5;
    }

    @keyframes scanline {
      0%, 100% { transform: translateX(-100%); opacity: 0; }
      50% { transform: translateX(100%); opacity: 0.5; }
    }

    .cyberflow-inner {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-xl);
      align-items: center;
    }

    @container (max-width: 700px) {
      .cyberflow-inner { grid-template-columns: 1fr; }
    }

    .cf-visual {
      background: var(--bg-card);
      border: 2px solid var(--accent);
      aspect-ratio: 4/3;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      animation: borderFlicker 3s ease-in-out infinite;
      clip-path: polygon(
        0 0, calc(100% - 20px) 0, 100% 20px, 100% 100%, 20px 100%, 0 calc(100% - 20px)
      );
    }

    .cf-visual::after {
      content: 'CyberFlow.info';
      font-family: var(--font-pixel);
      font-size: 0.8rem;
      line-height: 2;
      color: var(--accent);
      letter-spacing: 0.05em;
      text-shadow: 0 0 10px var(--accent-glow);
      animation: textGlitch 3s ease-in-out infinite;
    }

    .cf-visual::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(10,186,181,0.05) 2px,
        rgba(10,186,181,0.05) 4px
      );
    }

    .cf-features {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: var(--space-md);
    }

    .cf-feature {
      display: flex;
      gap: var(--space-md);
      align-items: flex-start;
      padding: var(--space-md);
      border-left: 4px solid var(--border);
      transition: all 0.15s;
    }

    .cf-feature:hover { 
      border-color: var(--accent); 
      transform: translateX(4px);
      background: var(--accent-subtle);
    }

    .cf-feature-icon {
      flex-shrink: 0;
      width: 2.5rem;
      height: 2.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--accent-subtle);
      font-size: 1rem;
      font-family: var(--font-pixel);
      border: 1px solid var(--accent-dim);
      color: var(--accent);
    }

    .cf-feature-title {
      font-weight: 600;
      margin-bottom: 0.3em;
      font-size: 0.95rem;
      font-family: var(--font-display);
      text-transform: uppercase;
    }

    .cf-feature-desc {
      font-size: 0.85rem;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    /* ===== VIDEO GRID ===== */
    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(100%, 280px), 1fr));
      gap: var(--space-md);
    }

    .video-card {
      background: var(--bg-card);
      border: 2px solid var(--border-subtle);
      overflow: hidden;
      transition: all 0.15s;
      clip-path: polygon(
        0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px)
      );
    }

    .video-card:hover {
      border-color: var(--accent);
      transform: translate(-3px, -3px);
      box-shadow: 3px 3px 0px var(--accent-dim), 0 0 20px var(--accent-glow);
    }

    .video-thumb {
      aspect-ratio: 16/9;
      background: var(--bg-elevated);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      border-bottom: 2px solid var(--border);
    }

    .video-thumb-icon {
      font-size: 2rem;
      font-family: var(--font-pixel);
      color: var(--accent);
      opacity: 0.7;
      animation: playPulse 2s ease-in-out infinite;
    }

    @keyframes playPulse {
      0%, 100% { opacity: 0.7; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.1); text-shadow: 0 0 20px var(--accent-glow); }
    }

    .video-thumb::after {
      content: '15:42';
      position: absolute;
      bottom: 0.5em;
      right: 0.5em;
      background: var(--bg-deep);
      border: 1px solid var(--accent);
      color: var(--accent);
      font-size: 0.6rem;
      font-family: var(--font-pixel);
      line-height: 1.8;
      padding: 0.3em 0.6em;
    }

    .video-info {
      padding: var(--space-md);
    }

    .video-title {
      font-size: 0.9rem;
      font-weight: 500;
      margin-bottom: 0.4em;
      line-height: 1.4;
      font-family: var(--font-display);
      text-transform: uppercase;
    }

    .video-meta {
      font-size: 0.6rem;
      color: var(--text-muted);
      font-family: var(--font-pixel);
      line-height: 1.8;
    }

    /* ===== MANIFESTO ===== */
    .manifesto {
      text-align: center;
      max-width: 65ch;
      margin: 0 auto;
      padding: var(--space-xl) var(--space-md);
      position: relative;
    }

    .manifesto::before {
      content: '◆ ◆ ◆';
      font-family: var(--font-pixel);
      font-size: 0.5rem;
      color: var(--accent-dim);
      display: block;
      margin-bottom: 2rem;
      letter-spacing: 1em;
      animation: diamondPulse 2s ease-in-out infinite;
    }

    .manifesto {
      color: var(--accent);
      font-style: normal;
      text-shadow: 0 0 10px var(--accent-glow);
    }

    /* ===== CONTACT ===== */
    .contact-section {
      text-align: center;
      padding: var(--space-xl) 0;
      border-top: 2px solid var(--border);
      position: relative;
    }

    .contact-email {
      font-family: var(--font-pixel);
      font-size: clamp(0.8rem, 3vw, 1.2rem);
      line-height: 1.8;
      color: var(--accent);
      display: inline-block;
      margin: var(--space-md) 0;
      position: relative;
      text-shadow: 0 0 10px var(--accent-glow);
      animation: borderFlicker 3s ease-in-out infinite;
      border: 2px solid var(--accent);
      padding: 0.5em 1em;
      letter-spacing: 0.05em;
    }

    .contact-email:hover {
      background: var(--accent);
      color: var(--bg-deep);
      text-shadow: none;
      box-shadow: 4px 4px 0px var(--accent-dim), 0 0 30px var(--accent-glow);
    }

    .contact-note {
      color: var(--text-secondary);
      max-width: 50ch;
      margin: var(--space-sm) auto 0;
      font-size: 0.85rem;
      line-height: 1.7;
    }

    /* ===== NAV ===== */
    .nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 1em 0;
      backdrop-filter: blur(12px);
      background: rgba(255, 255, 255, 0.95);
      border-bottom: 2px solid transparent;
      transition: border-color 0.3s;
    }

    .nav.scrolled { border-bottom-color: var(--accent); }

    .nav-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .nav-logo {
      font-family: var(--font-pixel);
      font-size: 0.8rem;
      line-height: 1.8;
      letter-spacing: 0.05em;
    }

    .nav-logo span { color: var(--accent); text-shadow: 0 0 10px var(--accent-glow); }

    .nav-links {
      display: flex;
      gap: 2em;
      list-style: none;
    }

    .nav-links a {
      font-size: 0.6rem;
      font-family: var(--font-pixel);
      line-height: 1.8;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      transition: all 0.15s;
      border: 1px solid transparent;
      padding: 0.3em 0.6em;
    }

    .nav-links a:hover { 
      color: var(--accent); 
      border-color: var(--accent);
      box-shadow: 2px 2px 0px var(--accent-dim);
      transform: translate(-2px, -2px);
    }

    /* ===== FOOTER ===== */
    .footer {
      border-top: 2px solid var(--border);
      padding: var(--space-lg) 0;
      text-align: center;
    }

    .footer-text {
      font-size: 0.6rem;
      color: var(--text-muted);
      font-family: var(--font-pixel);
      line-height: 1.8;
      letter-spacing: 0.05em;
    }

    /* ===== SCROLL REVEAL ===== */
    .reveal {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.7s var(--ease-out-expo), transform 0.7s var(--ease-out-expo);
    }
    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ===== SCROLL PROGRESS ===== */
    .scroll-progress {
      position: fixed;
      top: 0; left: 0;
      height: 3px;
      background: var(--accent);
      z-index: 1000;
      box-shadow: 0 0 10px var(--accent-glow);
      transition: width 0.1s;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .nav-links { display: none; }
      .hero-actions { flex-direction: column; }
      .hero-actions .btn { text-align: center; justify-content: center; }
      .hero-title { font-size: clamp(3rem, 12vw, 5rem); }
    }
  </style>
</head>
<body>

  <!-- PIXEL GRID BACKGROUND -->
  <div class="pixel-grid"></div>
  <div class="scroll-progress" id="scrollProgress"></div>

  <!-- NAV -->
  <nav class="nav" id="nav">
    <div class="container nav-inner">
      <a href="#" class="nav-logo" id="navLogo"></a>
      <ul class="nav-links" id="navLinks"></ul>
    </div>
  </nav>

  <!-- HERO -->
  <section class="hero" id="heroSection"></section>

  <!-- TOOLS / DASHBOARDS (dynamic) -->
  <section class="section" id="tools"></section>

  <div class="topo-line"></div>

  <!-- CONTENT COLLECTIONS (dynamic) -->
  <section class="section" id="content"></section>

  <div class="topo-line"></div>

  <!-- GITHUB REPOS (dynamic) -->
  <section class="section" id="github"></section>

  <div class="topo-line"></div>

  <!-- CYBERFLOW (dynamic) -->
  <section class="section cyberflow" id="cyberflow"></section>

  <div class="topo-line"></div>

  <!-- YOUTUBE VIDEOS (dynamic) -->
  <section class="section" id="videos"></section>

  <div class="topo-line"></div>

  <!-- CONTACT (dynamic) -->
  <section class="contact-section" id="contact"></section>

  <!-- FOOTER -->
  <footer class="footer" id="siteFooter"></footer>

  <script>
    /* ===== CONTENT LOADER ===== */
    let C = null;
    const CONTENT_URL = 'content.json';

    async function loadContent() {
      try {
        const res = await fetch(CONTENT_URL);
        if (!res.ok) throw new Error('Failed to load content.json');
        C = await res.json();
        renderAll();
        initEffects();
      } catch(e) {
        console.error('Content load error:', e);
        document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:monospace;font-size:0.8rem;color:var(--accent);">◆ LOADING CONTENT ◆</div>';
        setTimeout(loadContent, 3000);
      }
    }

    function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

    /* ===== RENDERERS ===== */
    function renderAll() {
      renderNav();
      renderHero();
      renderSection('tools', 'dashboards', renderDashboards);
      renderSection('content', 'articles', renderArticles);
      renderSection('github', 'github', renderGithub);
      renderCyberflow();
      renderSection('videos', 'videos', renderVideos);
      renderContact();
      renderFooter();
      document.title = C.site.title;
      const metaDesc = document.querySelector('meta[name="description"]');
      if (metaDesc) metaDesc.content = C.site.description;
    }

    function sectionHTML(data) {
      return `<div class="container">
        <div class="section-label reveal">${esc(data.label)}</div>
        <h2 class="section-title reveal">${esc(data.title)}${data.titleHighlight ? `<em class="accent">${esc(data.titleHighlight)}</em>` : ''}</h2>
        <p class="section-desc reveal">${esc(data.description)}</p>`;
    }

    function renderSection(id, key, renderItems) {
      const section = document.getElementById(id);
      if (!section || !C[key]) return;
      const data = C[key];
      section.innerHTML = sectionHTML(data) + renderItems(data) + '</div>';
    }

    function renderNav() {
      const nav = C.nav;
      document.getElementById('navLogo').innerHTML = `crazy<span>${esc(nav.logoHighlight)}</span>.ai`;
      document.getElementById('navLinks').innerHTML = nav.links.map(l =>
        `<li><a href="${esc(l.href)}">${esc(l.label)}</a></li>`
      ).join('');
    }

    function renderHero() {
      const h = C.hero;
      const buttons = h.buttons.map(b => {
        const attrs = b.external ? ' target="_blank" rel="noopener"' : '';
        return `<a href="${esc(b.href)}" class="btn ${esc(b.class)}"${attrs}>${esc(b.text)}</a>`;
      }).join('');

      const tickerItems = C.ticker.items;
      const tickerHTML = tickerItems.map(t => `<span>${esc(t)}</span>`).join('');
      // Duplicate for seamless loop
      const tickerDouble = tickerHTML + tickerHTML;

      document.getElementById('heroSection').innerHTML = `
        <div class="hero-glitch"></div>
        <div class="hero-inner container">
          <div class="hero-tag">${esc(h.tag)}</div>
          <h1 class="hero-title">${esc(h.titleLine1)}<br/>找到<em>${esc(h.titleHighlight)}</em></h1>
          <p class="hero-sub">${esc(h.subtitle)}</p>
          <div class="hero-actions">${buttons}</div>
        </div>
        <div class="ticker-wrap">
          <div class="ticker" id="ticker">${tickerDouble}</div>
        </div>
      `;
    }

    function renderDashboards(data) {
      return `<div class="dash-grid">${data.items.map(d => `
        <a href="${esc(d.link)}" class="dash-card reveal" target="_blank" rel="noopener">
          <span class="dash-card-icon">${d.icon}</span>
          <h3 class="dash-card-title">${esc(d.title)}</h3>
          <p class="dash-card-desc">${esc(d.description)}</p>
          <span class="dash-card-tag">${esc(d.tag)}</span>
          <span class="dash-card-link">${esc(d.linkText)}</span>
        </a>
      `).join('')}</div>`;
    }

    function renderArticles(data) {
      return `<div class="content-grid">${data.items.map(a => `
        <div class="content-card reveal">
          <div class="content-card-num">${esc(a.number)}</div>
          <h3 class="content-card-title">${esc(a.title)}</h3>
          <p class="content-card-desc">${esc(a.description)}</p>
          <div class="content-card-count">${esc(a.count)}</div>
        </div>
      `).join('')}</div>`;
    }

    function renderGithub(data) {
      const items = data.items.map(r => `
        <div class="gh-card reveal" data-repo="${esc(r.repo)}">
          <div class="gh-card-top">
            <span class="gh-card-name">${esc(r.name)}</span>
            <span class="gh-card-star">&#x2605; --</span>
          </div>
          <p class="gh-card-desc">${esc(r.description)}</p>
          <div class="gh-card-lang"><span class="gh-lang-dot">${esc(r.lang)}</span></div>
          <a href="https://github.com/${esc(data.username)}/${esc(r.repo)}" class="gh-card-cta" target="_blank" rel="noopener">查看源码 →</a>
        </div>
      `).join('');

      return `<div class="gh-grid" id="gh-grid">${items}</div>
        <p style="text-align:center; margin-top:var(--space-lg);">
          <a href="${esc(data.ctaLink)}" class="btn btn-ghost" target="_blank" rel="noopener">${esc(data.ctaText)}</a>
        </p>`;
    }

    function renderCyberflow() {
      const cf = C.cyberflow;
      const features = cf.features.map(f => `
        <li class="cf-feature reveal">
          <div class="cf-feature-icon">${f.icon}</div>
          <div>
            <div class="cf-feature-title">${esc(f.title)}</div>
            <div class="cf-feature-desc">${esc(f.description)}</div>
          </div>
        </li>
      `).join('');

      document.getElementById('cyberflow').innerHTML = `
        <div class="container">
          <div class="cyberflow-inner">
            <div class="cf-visual reveal"></div>
            <div>
              <div class="section-label reveal">${esc(cf.label)}</div>
              <h2 class="section-title reveal">${esc(cf.title)}<em class="accent">${esc(cf.titleHighlight)}</em></h2>
              <p class="section-desc reveal">${esc(cf.description)}</p>
              <ul class="cf-features">${features}</ul>
            </div>
          </div>
        </div>
      `;
    }

    function renderVideos(data) {
      return `<div class="video-grid">${data.items.map(v => `
        <a href="${esc(v.link)}" class="video-card reveal" target="_blank" rel="noopener">
          <div class="video-thumb"><span class="video-thumb-icon">[▶]</span></div>
          <div class="video-info">
            <div class="video-title">${esc(v.title)}</div>
            <div class="video-meta">YouTube · ${esc(v.duration)} · 免费</div>
          </div>
        </a>
      `).join('')}</div>
      <p style="text-align:center; margin-top:var(--space-lg); color:var(--text-muted); font-size:0.85rem;">
        <a href="${esc(data.moreLink)}" target="_blank" rel="noopener" style="color:var(--text-muted);">${esc(data.moreText)}</a>
      </p>`;
    }

    function renderContact() {
      const ct = C.contact;
      document.getElementById('contact').innerHTML = `
        <div class="container reveal">
          <div class="section-label">${esc(ct.label)}</div>
          <h2 class="section-title">${esc(ct.title)}</h2>
          <p class="contact-note">${esc(ct.note)}</p>
          <a href="mailto:${esc(ct.email)}" class="contact-email">${esc(ct.email)}</a>
        </div>
      `;
    }

    function renderFooter() {
      const f = C.footer;
      document.getElementById('siteFooter').innerHTML = `
        <div class="container">
          <p class="footer-text">${f.text} · <a href="${esc(f.githubLink)}" target="_blank" rel="noopener" style="color:var(--text-muted);">GitHub</a></p>
        </div>
      `;
    }

    /* ===== EFFECTS (after DOM is ready) ===== */
    function initEffects() {
      /* Nav scroll */
      const nav = document.getElementById('nav');
      window.addEventListener('scroll', () => {
        nav.classList.toggle('scrolled', window.scrollY > 60);
      });

      /* Scroll progress */
      const scrollProgress = document.getElementById('scrollProgress');
      window.addEventListener('scroll', () => {
        const scrollTop = window.scrollY;
        const docHeight = document.documentElement.scrollHeight - window.innerHeight;
        const progress = (scrollTop / docHeight) * 100;
        scrollProgress.style.width = Math.min(progress, 100) + '%';
      });

      /* Scroll reveal */
      const observer = new IntersectionObserver((entries) => {
        entries.forEach((entry, i) => {
          if (entry.isIntersecting) {
            setTimeout(() => entry.target.classList.add('visible'), i * 80);
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.1 });

      /* Observe after a short delay for DOM to settle */
      setTimeout(() => {
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
      }, 100);

      /* Ticker pause on hover */
      const ticker = document.getElementById('ticker');
      if (ticker) {
        ticker.addEventListener('mouseenter', () => ticker.style.animationPlayState = 'paused');
        ticker.addEventListener('mouseleave', () => ticker.style.animationPlayState = 'running');
      }

      /* GitHub API — fetch real star counts */
      (async () => {
        const cards = document.querySelectorAll('[data-repo]');
        for (const card of cards) {
          const repo = card.dataset.repo;
          try {
            const res = await fetch(`https://api.github.com/repos/${esc(C.github.username)}/${repo}`);
            if (!res.ok) continue;
            const data = await res.json();
            if (data.stargazers_count !== undefined) {
              const starEl = card.querySelector('.gh-card-star');
              if (starEl) starEl.innerHTML = `&#x2605; ${data.stargazers_count}`;
            }
          } catch(e) { /* fallback to -- */ }
        }
      })();

      /* Typing effect for hero title */
      const heroTitle = document.querySelector('.hero-title');
      if (heroTitle) {
        const originalHTML = heroTitle.innerHTML;
        const text = heroTitle.textContent || '';
        heroTitle.innerHTML = '';
        let i = 0;
        const typeInterval = setInterval(() => {
          if (i < text.length) {
            heroTitle.textContent += text.charAt(i);
            i++;
          } else {
            clearInterval(typeInterval);
            heroTitle.innerHTML = originalHTML;
          }
        }, 50);
      }
    }

    /* Boot */
    loadContent();
  </script>
</body>
</html>
