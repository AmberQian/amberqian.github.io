<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>crazyox.ai — 内容管理后台</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --bg2: #111;
      --bg3: #1a1a1a;
      --border: #2a2a2a;
      --text: #ccc;
      --text2: #888;
      --accent: #0ABAB5;
      --accent2: #0D9488;
      --red: #ef4444;
      --green: #22c55e;
      --font: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      --radius: 0;
    }
    *, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); font-size: 13px; line-height: 1.6; }
    a { color: var(--accent); text-decoration: none; }
    button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
    input, textarea, select { font-family: inherit; font-size: 13px; background: var(--bg2); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; outline: none; }
    input:focus, textarea:focus, select:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 60px; }

    /* ===== LAYOUT ===== */
    .app { display: none; height: 100vh; }
    .app.active { display: flex; }
    .sidebar { width: 220px; background: var(--bg2); border-right: 1px solid var(--border); overflow-y: auto; flex-shrink: 0; display: flex; flex-direction: column; }
    .sidebar-header { padding: 20px 16px; border-bottom: 1px solid var(--border); font-size: 15px; font-weight: bold; color: var(--accent); letter-spacing: 0.05em; }
    .sidebar-nav { flex: 1; padding: 12px 0; }
    .sidebar-nav a { display: block; padding: 8px 20px; color: var(--text2); font-size: 12px; letter-spacing: 0.03em; border-left: 2px solid transparent; transition: all 0.15s; }
    .sidebar-nav a:hover, .sidebar-nav a.active { color: var(--accent); border-left-color: var(--accent); background: rgba(10,186,181,0.05); }
    .sidebar-footer { padding: 12px 16px; border-top: 1px solid var(--border); font-size: 11px; color: var(--text2); }
    .sidebar-footer a { color: var(--text2); }
    .main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
    .main-header { padding: 16px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: var(--bg2); position: sticky; top: 0; z-index: 10; }
    .main-header h2 { font-size: 14px; font-weight: normal; letter-spacing: 0.05em; }
    .main-content { flex: 1; padding: 24px; max-width: 900px; }
    .main-content h3 { font-size: 18px; margin-bottom: 8px; color: var(--accent); letter-spacing: 0.03em; }
    .main-content .desc { color: var(--text2); margin-bottom: 24px; font-size: 12px; }

    /* ===== BUTTONS ===== */
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; font-size: 12px; letter-spacing: 0.03em; border: 1px solid var(--border); transition: all 0.15s; }
    .btn:hover { border-color: var(--accent); color: var(--accent); }
    .btn-primary { background: var(--accent); color: #000; border-color: var(--accent); font-weight: bold; }
    .btn-primary:hover { background: var(--accent2); color: #000; }
    .btn-danger { border-color: var(--red); color: var(--red); }
    .btn-danger:hover { background: var(--red); color: #fff; }
    .btn-sm { padding: 4px 10px; font-size: 11px; }
    .btn-icon { padding: 4px 8px; font-size: 14px; line-height: 1; }

    /* ===== LOGIN SCREEN ===== */
    .login-screen { display: flex; align-items: center; justify-content: center; height: 100vh; }
    .login-screen.hidden { display: none; }
    .login-box { background: var(--bg2); border: 1px solid var(--border); padding: 40px; width: 380px; text-align: center; }
    .login-box h1 { font-size: 20px; margin-bottom: 8px; color: var(--accent); }
    .login-box p { font-size: 12px; color: var(--text2); margin-bottom: 24px; }
    .login-box input { width: 100%; text-align: center; font-size: 16px; padding: 12px; margin-bottom: 16px; }
    .login-box .error { color: var(--red); font-size: 11px; margin-top: 8px; }

    /* ===== FORM GROUPS ===== */
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 11px; color: var(--text2); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.08em; }
    .form-group input, .form-group textarea, .form-group select { width: 100%; }
    .form-group .hint { font-size: 10px; color: var(--text2); margin-top: 4px; }

    /* ===== ARRAY ITEMS ===== */
    .array-item { background: var(--bg2); border: 1px solid var(--border); padding: 16px; margin-bottom: 12px; position: relative; }
    .array-item .item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .array-item .item-header span { font-size: 11px; color: var(--text2); letter-spacing: 0.05em; }
    .array-item .item-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .array-item .item-full { grid-column: 1 / -1; }
    .array-actions { margin-top: 12px; }

    /* ===== STATUS BAR ===== */
    .status-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg2); border-top: 1px solid var(--border); padding: 8px 24px; font-size: 11px; color: var(--text2); display: flex; justify-content: space-between; align-items: center; }
    .status-bar .saved { color: var(--green); }
    .status-bar .unsaved { color: var(--accent); }
    .status-bar .publishing { color: var(--accent); animation: blink 1s infinite; }
    @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

    /* ===== TOAST ===== */
    .toast { position: fixed; top: 20px; right: 20px; background: var(--accent); color: #000; padding: 12px 24px; font-size: 12px; z-index: 999; opacity: 0; transform: translateY(-10px); transition: all 0.3s; pointer-events: none; }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.error { background: var(--red); color: #fff; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .main-content { padding: 16px; }
      .array-item .item-grid { grid-template-columns: 1fr; }
    }

    /* ===== PREVIEW MODAL ===== */
    .preview-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; display: none; }
    .preview-overlay.show { display: flex; align-items: center; justify-content: center; }
    .preview-box { background: var(--bg); border: 1px solid var(--border); padding: 24px; max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto; }
    .preview-box h4 { color: var(--accent); margin-bottom: 16px; }
    .preview-box pre { white-space: pre-wrap; font-size: 11px; color: var(--text2); }
  </style>
</head>
<body>

  <!-- LOGIN SCREEN -->
  <div class="login-screen" id="loginScreen">
    <div class="login-box">
      <h1>crazyox.ai</h1>
      <p>内容管理后台</p>
      <input type="password" id="loginPassword" placeholder="请输入管理密码" autofocus />
      <button class="btn btn-primary" onclick="doLogin()" style="width:100%;">进入后台</button>
      <div class="error" id="loginError"></div>
      <p id="setupHint" style="margin-top:16px;font-size:10px;color:var(--text2);display:none;">首次使用？输入你想设置的密码即可。</p>
    </div>
  </div>

  <!-- MAIN APP -->
  <div class="app" id="app">
    <div class="sidebar">
      <div class="sidebar-header">◆ 内容管理</div>
      <nav class="sidebar-nav" id="sidebarNav"></nav>
      <div class="sidebar-footer">
        <a href="/" target="_blank">查看网站 →</a>
      </div>
    </div>
    <div class="main">
      <div class="main-header">
        <h2 id="sectionTitle">Hero 首屏</h2>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-sm" onclick="previewJSON()">预览 JSON</button>
          <button class="btn btn-primary btn-sm" id="publishBtn" onclick="publishContent()">◆ 发布到网站</button>
        </div>
      </div>
      <div class="main-content" id="mainContent"></div>
    </div>
  </div>

  <!-- STATUS BAR -->
  <div class="status-bar" id="statusBar" style="display:none;">
    <span id="statusLeft">已加载内容</span>
    <span id="statusRight"></span>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <!-- PREVIEW OVERLAY -->
  <div class="preview-overlay" id="previewOverlay" onclick="this.classList.remove('show')">
    <div class="preview-box" onclick="event.stopPropagation()">
      <h4>content.json 预览</h4>
      <pre id="previewContent"></pre>
    </div>
  </div>

  <script>
    /* ===== STATE ===== */
    let content = null;
    let currentSection = 'hero';
    let changed = false;
    const REPO_OWNER = 'AmberQian';
    const REPO_NAME = 'amberqian.github.io';
    const FILE_PATH = 'content.json';

    /* ===== SECTIONS CONFIG ===== */
    const sections = [
      { id: 'hero', label: 'Hero 首屏' },
      { id: 'ticker', label: 'Ticker 跑马灯' },
      { id: 'dashboards', label: '仪表盘工具' },
      { id: 'articles', label: '长文合集' },
      { id: 'github', label: 'GitHub 仓库' },
      { id: 'cyberflow', label: 'CyberFlow' },
      { id: 'videos', label: 'YouTube 视频' },
      { id: 'contact', label: '联系方式' },
      { id: 'footer', label: '页脚' },
      { id: 'nav', label: '导航栏' },
      { id: 'site', label: '站点设置' },
    ];

    /* ===== INIT ===== */
    document.addEventListener('DOMContentLoaded', () => {
      const hash = localStorage.getItem('crazyox_admin_pw');
      if (!hash) {
        document.getElementById('setupHint').style.display = 'block';
      }
      document.getElementById('loginPassword').addEventListener('keydown', e => {
        if (e.key === 'Enter') doLogin();
      });
    });

    /* ===== AUTH ===== */
    async function sha256(str) {
      const buf = new TextEncoder().encode(str);
      const hash = await crypto.subtle.digest('SHA-256', buf);
      return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2,'0')).join('');
    }

    async function doLogin() {
      const pw = document.getElementById('loginPassword').value.trim();
      if (!pw) return;
      const inputHash = await sha256(pw);
      const storedHash = localStorage.getItem('crazyox_admin_pw');

      if (!storedHash) {
        localStorage.setItem('crazyox_admin_pw', inputHash);
        showMain();
        return;
      }

      if (inputHash === storedHash) {
        showMain();
      } else {
        document.getElementById('loginError').textContent = '密码错误';
      }
    }

    async function showMain() {
      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('app').classList.add('active');
      document.getElementById('statusBar').style.display = 'flex';
      buildSidebar();
      await loadContentData();
      switchSection('hero');
      updateStatus();
    }

    /* ===== CONTENT LOADING ===== */
    async function loadContentData() {
      try {
        const res = await fetch('content.json?' + Date.now());
        if (res.ok) {
          content = await res.json();
        } else {
          throw new Error('Failed to load');
        }
      } catch(e) {
        // fallback: load from GitHub raw
        try {
          const res = await fetch(`https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/main/${FILE_PATH}`);
          if (res.ok) content = await res.json();
          else throw new Error('Cannot load content');
        } catch(e2) {
          toast('无法加载内容，请检查网络', 'error');
        }
      }
    }

    /* ===== SIDEBAR ===== */
    function buildSidebar() {
      document.getElementById('sidebarNav').innerHTML = sections.map(s =>
        `<a href="#" data-section="${s.id}" onclick="switchSection('${s.id}');return false;">${s.label}</a>`
      ).join('');
      updateSidebarActive();
    }

    function updateSidebarActive() {
      document.querySelectorAll('.sidebar-nav a').forEach(a => {
        a.classList.toggle('active', a.dataset.section === currentSection);
      });
    }

    /* ===== SECTION SWITCHING ===== */
    function switchSection(id) {
      currentSection = id;
      updateSidebarActive();
      document.getElementById('sectionTitle').textContent = sections.find(s => s.id === id)?.label || id;
      renderSection(id);
    }

    function renderSection(id) {
      const mc = document.getElementById('mainContent');
      if (!content) { mc.innerHTML = '<p>加载中...</p>'; return; }

      switch(id) {
        case 'hero': renderHeroForm(mc); break;
        case 'ticker': renderTickerForm(mc); break;
        case 'dashboards': renderDashboardsForm(mc); break;
        case 'articles': renderArticlesForm(mc); break;
        case 'github': renderGithubForm(mc); break;
        case 'cyberflow': renderCyberflowForm(mc); break;
        case 'videos': renderVideosForm(mc); break;
        case 'contact': renderContactForm(mc); break;
        case 'footer': renderFooterForm(mc); break;
        case 'nav': renderNavForm(mc); break;
        case 'site': renderSiteForm(mc); break;
      }
    }

    /* ===== HELPERS ===== */
    function esc(s) { const d=document.createElement('div'); d.textContent=String(s); return d.innerHTML; }
    function genId() { return 'id_' + Math.random().toString(36).substr(2, 9); }

    function markChanged() { changed = true; updateStatus(); }

    function updateStatus() {
      document.getElementById('statusLeft').textContent = changed ? '◆ 有未发布的修改' : '✓ 已是最新版本';
      document.getElementById('statusLeft').className = changed ? 'unsaved' : 'saved';
      const pubBtn = document.getElementById('publishBtn');
      if (changed) {
        pubBtn.style.opacity = '1';
        pubBtn.textContent = '◆ 发布到网站（有修改）';
      } else {
        pubBtn.textContent = '✓ 已发布';
        pubBtn.style.opacity = '0.6';
      }
    }

    function toast(msg, type) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast show' + (type === 'error' ? ' error' : '');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    /* ===== FIELD HELPERS ===== */
    function textField(label, path, hint) {
      const val = getNested(content, path) || '';
      return `<div class="form-group">
        <label>${label}</label>
        <input type="text" value="${esc(val)}" data-path="${path}" onchange="setNested(content, this.dataset.path, this.value);markChanged();" />
        ${hint ? `<div class="hint">${hint}</div>` : ''}
      </div>`;
    }

    function textareaField(label, path, rows) {
      const val = getNested(content, path) || '';
      return `<div class="form-group">
        <label>${label}</label>
        <textarea rows="${rows||3}" data-path="${path}" onchange="setNested(content, this.dataset.path, this.value);markChanged();">${esc(val)}</textarea>
      </div>`;
    }

    function getNested(obj, path) {
      return path.split('.').reduce((o,k) => (o||{})[k], obj);
    }

    function setNested(obj, path, value) {
      const keys = path.split('.');
      const last = keys.pop();
      const target = keys.reduce((o,k) => {
        if (!(k in o) || typeof o[k] !== 'object') o[k] = {};
        return o[k];
      }, obj);
      target[last] = value;
    }

    /* ===== FORM RENDERERS ===== */

    function renderHeroForm(mc) {
      const h = content.hero;
      mc.innerHTML = `<h3>Hero 首屏</h3><p class="desc">网站顶部的主视觉区域</p>
        ${textField('标签 (Tag)', 'hero.tag')}
        ${textField('标题第一行', 'hero.titleLine1')}
        ${textField('标题高亮词', 'hero.titleHighlight', '会被特殊颜色高亮显示')}
        ${textField('副标题', 'hero.subtitle', 'Hero 区域的描述文字')}
        <div class="form-group"><label>按钮列表</label></div>
        <div id="heroButtons">${(h.buttons||[]).map((b,i) => renderHeroButton(b,i)).join('')}</div>
        <div class="array-actions">
          <button class="btn btn-sm" onclick="addHeroButton()">+ 添加按钮</button>
        </div>`;
    }

    function renderHeroButton(b, i) {
      return `<div class="array-item" id="heroBtn_${i}">
        <div class="item-header"><span>按钮 #${i+1}</span>
          <button class="btn btn-sm btn-danger" onclick="removeArrayItem('hero','buttons',${i});renderSection('hero');">删除</button>
        </div>
        <div class="item-grid">
          <div class="form-group">
            <label>按钮文字</label>
            <input type="text" value="${esc(b.text||'')}" onchange="content.hero.buttons[${i}].text=this.value;markChanged();" />
          </div>
          <div class="form-group">
            <label>链接</label>
            <input type="text" value="${esc(b.href||'')}" onchange="content.hero.buttons[${i}].href=this.value;markChanged();" />
          </div>
          <div class="form-group">
            <label>样式类名</label>
            <select onchange="content.hero.buttons[${i}]['class']=this.value;markChanged();">
              <option value="btn-primary" ${b.class==='btn-primary'?'selected':''}>主按钮 (btn-primary)</option>
              <option value="btn-ghost" ${b.class==='btn-ghost'?'selected':''}>次级按钮 (btn-ghost)</option>
            </select>
          </div>
          <div class="form-group">
            <label>外链?</label>
            <select onchange="content.hero.buttons[${i}].external=this.value==='true';markChanged();">
              <option value="false" ${!b.external?'selected':''}>否 (站内)</option>
              <option value="true" ${b.external?'selected':''}>是 (新窗口)</option>
            </select>
          </div>
        </div>
      </div>`;
    }

    function addHeroButton() {
      if (!content.hero.buttons) content.hero.buttons = [];
      content.hero.buttons.push({ text: '新按钮', href: '#', class: 'btn-ghost', external: false });
      markChanged();
      renderSection('hero');
    }

    function removeArrayItem(section, key, index) {
      content[section][key].splice(index, 1);
      markChanged();
    }

    function renderTickerForm(mc) {
      const items = content.ticker?.items || [];
      mc.innerHTML = `<h3>Ticker 跑马灯</h3><p class="desc">Hero 下方的滚动文字条</p>
        <div class="form-group"><label>跑马灯条目 (自动复制双份实现无缝滚动)</label></div>
        <div id="tickerItems">${items.map((t,i) => renderTickerItem(t,i)).join('')}</div>
        <div class="array-actions">
          <button class="btn btn-sm" onclick="addTickerItem()">+ 添加条目</button>
        </div>`;
    }

    function renderTickerItem(t, i) {
      return `<div class="array-item">
        <div class="item-header"><span>条目 #${i+1}</span>
          <button class="btn btn-sm btn-danger" onclick="content.ticker.items.splice(${i},1);markChanged();renderSection('ticker');">删除</button>
        </div>
        <input type="text" value="${esc(t)}" style="width:100%;" onchange="content.ticker.items[${i}]=this.value;markChanged();" />
      </div>`;
    }

    function addTickerItem() {
      content.ticker.items.push('新条目');
      markChanged();
      renderSection('ticker');
    }

    function renderDashboardsForm(mc) {
      const d = content.dashboards;
      mc.innerHTML = `<h3>仪表盘工具列表</h3><p class="desc">Tools & Dashboards 区域</p>
        ${textField('区块标签', 'dashboards.label')}
        ${textField('标题前半', 'dashboards.title')}
        ${textField('标题高亮 (后半)', 'dashboards.titleHighlight')}
        ${textareaField('描述文字', 'dashboards.description', 3)}
        <div class="form-group"><label>仪表盘列表</label></div>
        <div id="dashItems">${(d.items||[]).map((di,i) => renderDashItem(di,i)).join('')}</div>
        <div class="array-actions">
          <button class="btn btn-sm" onclick="addDashItem()">+ 添加仪表盘</button>
        </div>`;
    }

    function renderDashItem(di, i) {
      return `<div class="array-item" id="dash_${i}">
        <div class="item-header"><span>仪表盘 #${i+1}</span>
          <button class="btn btn-sm btn-danger" onclick="content.dashboards.items.splice(${i},1);markChanged();renderSection('dashboards');">删除</button>
        </div>
        <div class="item-grid">
          <div class="form-group"><label>图标 (HTML)</label>
            <input type="text" value="${esc(di.icon||'')}" onchange="content.dashboards.items[${i}].icon=this.value;markChanged();" /></div>
          <div class="form-group"><label>标题</label>
            <input type="text" value="${esc(di.title||'')}" onchange="content.dashboards.items[${i}].title=this.value;markChanged();" /></div>
          <div class="form-group item-full"><label>描述</label>
            <textarea rows="2" onchange="content.dashboards.items[${i}].description=this.value;markChanged();">${esc(di.description||'')}</textarea></div>
          <div class="form-group"><label>标签</label>
            <input type="text" value="${esc(di.tag||'')}" onchange="content.dashboards.items[${i}].tag=this.value;markChanged();" /></div>
          <div class="form-group"><label>链接文字</label>
            <input type="text" value="${esc(di.linkText||'')}" onchange="content.dashboards.items[${i}].linkText=this.value;markChanged();" /></div>
          <div class="form-group item-full"><label>链接 URL</label>
            <input type="text" value="${esc(di.link||'')}" onchange="content.dashboards.items[${i}].link=this.value;markChanged();" /></div>
        </div>
      </div>`;
    }

    function addDashItem() {
      content.dashboards.items.push({ icon: '[◆]', title: '新仪表盘', description: '描述', tag: '标签', linkText: '打开 →', link: 'https://' });
      markChanged();
      renderSection('dashboards');
    }

    function renderArticlesForm(mc) {
      const a = content.articles;
      mc.innerHTML = `<h3>长文分类合集</h3><p class="desc">Content Collections 区域</p>
        ${textField('区块标签', 'articles.label')}
        ${textField('标题前半', 'articles.title')}
        ${textField('标题高亮 (后半)', 'articles.titleHighlight')}
        ${textareaField('描述文字', 'articles.description', 3)}
        <div class="form-group"><label>合集列表</label></div>
        <div id="articleItems">${(a.items||[]).map((ai,i) => renderArticleItem(ai,i)).join('')}</div>
        <div class="array-actions">
          <button class="btn btn-sm" onclick="addArticleItem()">+ 添加合集</button>
        </div>`;
    }

    function renderArticleItem(ai, i) {
      return `<div class="array-item">
        <div class="item-header"><span>合集 #${i+1}</span>
          <button class="btn btn-sm btn-danger" onclick="content.articles.items.splice(${i},1);markChanged();renderSection('articles');">删除</button>

    /* ===== PUBLISH ===== */
    async function publishContent() {
      if (!changed) { toast('没有需要发布的修改', 'error'); return; }

      const token = localStorage.getItem('crazyox_gh_token');
      if (!token) {
        const input = prompt('请输入 GitHub Personal Access Token（需要 repo 权限）：\n\n获取地址：https://github.com/settings/tokens/new\n\n该 Token 仅存储在浏览器本地。');
        if (!input) return;
        localStorage.setItem('crazyox_gh_token', input.trim());
        return publishContent();
      }

      const pubBtn = document.getElementById('publishBtn');
      pubBtn.textContent = '⏳ 发布中...';
      pubBtn.disabled = true;
      document.getElementById('statusLeft').className = 'publishing';
      document.getElementById('statusLeft').textContent = '◆ 正在发布...';

      try {
        // Get current file SHA
        const getRes = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`, {
          headers: { Authorization: `token ${token}` }
        });
        if (!getRes.ok) throw new Error('无法获取文件信息 (检查 Token 权限)');
        const fileInfo = await getRes.json();

        // Encode content
        const jsonStr = JSON.stringify(content, null, 2);
        const base64 = btoa(unescape(encodeURIComponent(jsonStr)));

        // Commit
        const putRes = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`, {
          method: 'PUT',
          headers: {
            Authorization: `token ${token}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            message: 'update: content via admin panel',
            content: base64,
            sha: fileInfo.sha
          })
        });

        if (!putRes.ok) {
          const err = await putRes.json();
          throw new Error(err.message || '发布失败');
        }

        changed = false;
        updateStatus();
        toast('✓ 发布成功！网站将在 1-2 分钟后更新。');
        document.getElementById('statusLeft').textContent = '✓ 已发布';
        document.getElementById('statusLeft').className = 'saved';
      } catch(e) {
        toast('发布失败: ' + e.message, 'error');
        document.getElementById('statusLeft').textContent = '⚠ 发布失败';
        document.getElementById('statusLeft').className = 'unsaved';
      }

      pubBtn.textContent = changed ? '◆ 发布到网站（有修改）' : '✓ 已发布';
      pubBtn.disabled = false;
      if (!changed) pubBtn.style.opacity = '0.6';
    }

    /* ===== PREVIEW ===== */
    function previewJSON() {
      document.getElementById('previewContent').textContent = JSON.stringify(content, null, 2);
      document.getElementById('previewOverlay').classList.add('show');

    /* ===== KEYBOARD SHORTCUTS ===== */
    document.addEventListener('keydown', e => {
      if ((e.metaKey || e.ctrlKey) && e.key === 's') {
        e.preventDefault();
        publishContent();
      }
